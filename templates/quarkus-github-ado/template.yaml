apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: quarkus-github-ado
  title: Aplicação Quarkus — GitHub + Azure DevOps
  description: >
    Cria um repositório GitHub com uma aplicação Quarkus mínima,
    configura uma pipeline no Azure DevOps e registra o componente no catálogo RHDH.
  tags:
    - quarkus
    - java
    - azure-devops
    - github
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Informações da aplicação
      required:
        - appName
        - description
      properties:
        appName:
          title: Nome da aplicação
          type: string
          description: Nome do repositório GitHub e da pipeline ADO (sem espaços)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Descrição
          type: string

    - title: Repositório GitHub
      required:
        - githubUser
        - repoVisibility
      properties:
        githubUser:
          title: Usuário ou organização GitHub
          type: string
        repoVisibility:
          title: Visibilidade do repositório
          type: string
          enum: [public, private]
          default: public

    - title: Azure DevOps
      required:
        - adoOrg
        - adoProject
      properties:
        adoOrg:
          title: Organização ADO
          type: string
        adoProject:
          title: Projeto ADO
          type: string

  steps:
    - id: fetch
      name: Gerar código da aplicação
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          githubUser: ${{ parameters.githubUser }}
          adoOrg: ${{ parameters.adoOrg }}
          adoProject: ${{ parameters.adoProject }}

    - id: publish
      name: Publicar no GitHub
      action: publish:github
      input:
        repoUrl: "github.com?owner=${{ parameters.githubUser }}&repo=${{ parameters.appName }}"
        repoVisibility: ${{ parameters.repoVisibility }}
        defaultBranch: main
        gitCommitMessage: "feat: scaffold inicial via RHDH"

    - id: create-pipeline
      name: Criar pipeline no Azure DevOps
      action: azure:pipeline:create
      input:
        organization: ${{ parameters.adoOrg }}
        project: ${{ parameters.adoProject }}
        folder: "/"
        name: "${{ parameters.adoOrg }}.${{ parameters.appName }}"
        repositoryId: "${{ parameters.githubUser }}/${{ parameters.appName }}"
        repositoryName: "${{ parameters.githubUser }}/${{ parameters.appName }}"
        yamlPath: "/azure-pipelines.yml"
        serviceConnectionId: "5ca773a8-a249-418c-b8b2-95f61e4f8e6c"

    - id: run-pipeline
      name: Disparar primeira execução
      action: azure:pipeline:run
      input:
        organization: ${{ parameters.adoOrg }}
        project: ${{ parameters.adoProject }}
        pipelineId: ${{ steps['create-pipeline'].output.pipelineId }}

    - id: register
      name: Registrar no catálogo RHDH
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Repositório GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Componente no catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}